<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who are you? 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="blob-bg">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<div class="floaties" id="floaties"></div>

<div id="progressDots" class="progress-dots"></div>

<div class="page-wrap">
  <div class="card" id="card">
    <span class="icon-big">🔐</span>
    <h1 class="page-title">Heyyy! Who are you?</h1>
    <p class="sub-text">This is a very secret, very special place.<br>You need the passcode to enter! 🌸</p>
    <div class="rxn" id="rxn"></div>
    <input type="text" id="passInput" class="text-input" placeholder="Type your name here..." autocomplete="off" />
    <button class="btn-primary" onclick="checkPass()">Let me in! ✨</button>
    <p class="hint" id="hint">Hint: Think about who you are to someone called Bobby... 💍</p>
  </div>
</div>

<script src="js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  initFloaties(["🌸","💕","✨","🌷","💖","⭐","🦋","🌈","💫","🎀","🐣","🍬"]);
  initDots(4, 0);
});

var attempts = 0;
var emptyAttempts = 0;

var emptyReplies = [
  ["Hey!! 🚫", "You cannot sneak in with nothing! No cheating allowed here, type something! 😤"],
  ["Empty box, empty entry! 🙅", "The door does not open itself! Who ARE you? Type it! 😂"],
  ["Nice try!! 🫠", "Blank is not a password babe. Put SOMETHING in that box! 🌸"],
  ["STILL empty?? 😭", "I am begging you. Just type. Anything. Well not anything. Type your NAME! 💕"]
];

function getWrongReply(name) {
  var n = name.charAt(0).toUpperCase() + name.slice(1);
  var low = name.toLowerCase().trim();

  if (low === "devika" || low === "devi") {
    var devReplies = [
      ["Devika? Devika who? 🤔", "I know a Devika... but she goes by a much more official title around here. Think harder! 👀"],
      ["Hmm " + n + "... 🙈", "That name rings a bell but that is NOT the password! Who are you to Bobby? 💍"],
      ["Okay " + n + " listen 😂", "You ARE the right person but wrong name! You are not just Devika anymore, are you? 😏"],
      ["DEVIKA. 😭", "You are so close and so far at the same time!! You have a title now! Use it!! 🌸"]
    ];
    return devReplies[Math.min(attempts, devReplies.length - 1)];
  }
  if (low === "bujjamma" || low === "bujji") {
    return ["Bujjamma!! 🥺😂", "Aww that is the cutest name ever but still NOT the password! Bobby needs your official title here! 👑💍"];
  }
  if (low === "pondati" || low === "pondatti") {
    return ["Pondati!! 😂💕", "Okay that is technically correct but Bobby wants the English version! Think Mrs. something... 😏"];
  }
  if (low === "wife" || low === "your wife" || low === "his wife") {
    return ["Whose wife though?? 👀", "You are on the right track!! Now put a NAME with that! Whose wife are you exactly? 😏💍"];
  }
  if (low === "mrs" || low === "mrs.") {
    return ["Mrs... Mrs WHO?? 🤭", "You are SO close!! Mrs. + ??? Fill in the blank! It is a nickname. A very cute one. 😄💕"];
  }
  if (low === "pavan" || low === "pavan kalyan") {
    return ["That is Bobby real name! 😂", "But this page wants to know who YOU are, not who he is! Try again! 🌸"];
  }
  if (low === "bobby") {
    return ["Bobby is the one WHO MADE THIS PAGE! 😤😂", "I need to know who YOU are! Are you Bobby wife? 💍"];
  }
  if (low.length <= 2) {
    return ["That is barely a word!! 😭", "I need more than just " + n + " to let you in! Who are you really? 🌸"];
  }
  var fallbacks = [
    [n + "? Never heard of them! 🤷", "Only one person is allowed in here and " + n + " is not on the list! Who are you to Bobby? 💍"],
    ["Hmm " + n + "... 🧐", "Nope! That name is not in my system. Think about your relationship with Bobby! 💕"],
    [n + " who?? 😂", "I checked the guest list three times. No " + n + " here! Try your official Bobby title! 👑"],
    ["Still " + n + "?? 😤", "Babe. Bobby. Wife. Put it together!! 🌸💍"]
  ];
  return fallbacks[Math.min(attempts, fallbacks.length - 1)];
}

function checkPass() {
  var raw = document.getElementById("passInput").value.trim();
  var rxn = document.getElementById("rxn");
  var card = document.getElementById("card");

  if (raw === "") {
    card.classList.remove("wiggle"); void card.offsetWidth; card.classList.add("wiggle");
    var er = emptyReplies[Math.min(emptyAttempts, emptyReplies.length - 1)];
    rxn.innerHTML = "<strong>" + er[0] + "</strong><br>" + er[1];
    rxn.classList.add("show");
    emptyAttempts++;
    spawnStars("card");
    return;
  }

  var input = raw.toLowerCase().replace(/[^a-z\s]/g, "").trim();
  var ok = (input.indexOf("bobby") !== -1 && (input.indexOf("mrs") !== -1 || input.indexOf("wife") !== -1))
         || (input.indexOf("pavan") !== -1 && input.indexOf("wife") !== -1)
         || input === "mrsbobby" || input === "mrs bobby";

  if (ok) {
    card.innerHTML = "<span class='icon-big'>🥳</span><h1 class='page-title'>MRS. BOBBY!!</h1><p class='sub-text' style='color:#c084fc;font-size:1.1rem;margin-bottom:0'>YESSS!! I knew it was you!!<br>Welcome, welcome, WELCOME!! 🎉💕<br><br>Taking you somewhere very special...</p>";
    setTimeout(function() { window.location.href = "welcome.html"; }, 2800);
    return;
  }

  card.classList.remove("wiggle"); void card.offsetWidth; card.classList.add("wiggle");
  var r = getWrongReply(raw);
  rxn.innerHTML = "<strong>" + r[0] + "</strong><br>" + r[1];
  rxn.classList.add("show");
  attempts++;
  if (attempts >= 2) document.getElementById("hint").classList.add("show");
  spawnStars("card");
}

document.getElementById("passInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPass();
});
</script>
</body>
</html>
